<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>
<div th:fragment="sharedheader" class="fixed-top">
    <nav class="navbar navbar-expand-sm navbar-toggleable-sm navbar-light bg-white border-bottom box-shadow mb-3">
        <a class="navbar-brand" style="font-family: 'Courier New', monospace;
            font-size: 24px"><b>SportStore</b></a>
        <a class="navbar-brand" th:href="@{~/products-view}">Clothes</a>
        <a class="navbar-brand" th:href="@{~/brands-view}">Brands</a>
        <a class="navbar-brand" th:href="@{~/orders-view}">My orders</a>
        <a class="navbar-brand" th:href="@{~/privacy-policy}">About us</a>
        <div class="ml-auto col-auto">
            <a class="btn btn-lg btn-danger" th:href="@{~/start-page}">Exit</a>
        </div>
    </nav>
</div>

<div th:fragment="adminsharedheader" class="fixed-top">
    <nav class="navbar navbar-expand-sm navbar-toggleable-sm navbar-light bg-white border-bottom box-shadow mb-3">
        <a class="navbar-brand" style="font-family: 'Courier New', monospace;
            font-size: 24px"><b>SportStore</b></a>
        <a class="navbar-brand" th:href="@{~/products-view-admin}">Clothes</a>
        <a class="navbar-brand" th:href="@{~/brands-view-admin}">Brands</a>
        <a class="navbar-brand" th:href="@{~/products-add}">Add an item</a>
        <a class="navbar-brand" th:href="@{~/products-manage}">Manage items</a>
        <a class="navbar-brand" th:href="@{~/orders-manage}">Orders</a>
        <a class="navbar-brand" th:href="@{~/admin-add}">New admin</a>
        <a class="navbar-brand" th:href="@{~/privacy-policy-admin}">About us</a>
        <div class="ml-auto col-auto">
            <a class="btn btn-lg btn-danger" style="margin-left: 240px" th:href="@{~/start-page}">Exit</a>
        </div>
    </nav>
</div>
</body>
</html>
