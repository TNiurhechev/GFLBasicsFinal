<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Товари</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

</head>
<body>
    <div th:insert="layout/header :: adminsharedheader"></div>
    <div class="text-center">
        <h2 class="display-4" style="margin-top: 70px">
            Clothes available
        </h2>

        <table class="table table-hover table-striped" style="width: 100%; margin: auto">
            <thead class="thead">
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Brand</th>
                <th scope="col">Item</th>
                <th scope="col">Price</th>
                <th scope="col">Size</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td scope="row" th:text="${product.productId}"></td>
                <td th:text="${product.manufacturer.name}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.price}"></td>
                <td th:text="${product.size}"></td>
            </tr>
            </tbody>
        </table>
        <small class="text-muted">*Placing an order unavailable in admin mode</small>
    </div>
    <div th:insert="layout/footer :: adminfooter"></div>
</body>
</html>
